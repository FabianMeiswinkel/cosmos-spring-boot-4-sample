# ──────────────────────────────────────────────────────────────
# Cosmos DB connection – set via environment variables:
#   COSMOS_URI  – e.g. https://<account>.documents.azure.com:443/
#   COSMOS_KEY  – primary or secondary key
# ──────────────────────────────────────────────────────────────
spring.cloud.azure.cosmos.endpoint=${COSMOS_URI}
spring.cloud.azure.cosmos.key=${COSMOS_KEY}
spring.cloud.azure.cosmos.database=sampledb
spring.cloud.azure.cosmos.populate-query-metrics=false
